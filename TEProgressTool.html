<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TE Daily Progress Tool</title>
  <style>
    :root { --bg:#f6f8fb; --panel:#fff; --ink:#152033; --muted:#64748b; --line:#d8e0ea; --blue:#0369a1; --green:#047857; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:"Segoe UI","Microsoft JhengHei",sans-serif; }
    main { max-width:1180px; margin:28px auto; padding:0 18px 40px; }
    .shell { background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:0 18px 44px rgba(15,23,42,.08); padding:28px; }
    h1 { margin:0 0 6px; text-align:center; font-size:28px; }
    .sub { margin:0 0 24px; text-align:center; color:var(--muted); font-size:14px; }
    .drop { border:2px dashed #b8c6d8; border-radius:14px; background:#f8fafc; padding:30px; text-align:center; cursor:pointer; transition:.18s; }
    .drop:hover,.drop.dragover { border-color:var(--blue); background:#f0f9ff; }
    .drop strong { display:block; font-size:16px; margin-bottom:6px; }
    .drop span,.note { color:var(--muted); font-size:12px; }
    input[type=file],.hidden { display:none; }
    .section { margin-top:18px; border:1px solid var(--line); border-radius:14px; background:#fbfdff; padding:16px; }
    .section-title { font-weight:800; color:#26364d; margin-bottom:10px; }
    textarea { width:100%; min-height:118px; resize:vertical; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font:14px/1.5 "Segoe UI","Microsoft JhengHei",sans-serif; color:var(--ink); background:white; }
    textarea:focus { outline:2px solid #bae6fd; border-color:var(--blue); }
    .filter-actions { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:10px; }
    .actions { display:flex; justify-content:space-between; gap:12px; align-items:center; background:#eff6ff; border:1px solid #bfdbfe; border-radius:14px; padding:14px 16px; margin-top:18px; }
    .summary { color:#1e3a8a; font-weight:800; }
    button.primary { border:0; background:var(--blue); color:white; border-radius:9px; padding:10px 16px; font-weight:800; cursor:pointer; white-space:nowrap; }
    button.primary:hover { background:#075985; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; background:white; margin-top:12px; max-height:560px; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th { background:#1f2937; color:white; position:sticky; top:0; z-index:1; }
    td,th { padding:10px 12px; border-bottom:1px solid #e5eaf1; white-space:nowrap; }
    td:not(:first-child),th:not(:first-child) { text-align:right; font-variant-numeric:tabular-nums; }
    tbody tr:hover { background:#f8fafc; }
    .total-row { background:#f1f5f9; font-weight:900; }
    .total-col { color:var(--green); font-weight:900; }
    @media (max-width:820px) { .shell{padding:18px;} .actions,.filter-actions{align-items:stretch; flex-direction:column;} }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <h1>TE Daily Progress Tool</h1>
      <p class="sub">上傳 TestVault .xlsx，依 TE 與日期統計 Planned Setup Time + Planned Attended Time 的產出小時</p>

      <section id="dropZone" class="drop">
        <strong id="fileName">點選或拖曳 Excel 檔到這裡</strong>
        <span>支援 .xlsx，資料只在本機瀏覽器解析，不會上傳</span>
        <input id="fileInput" type="file" accept=".xlsx">
      </section>

      <section id="filterSection" class="section hidden">
        <div class="section-title">貼上要顯示的 TE 名單</div>
        <textarea id="testerInput" placeholder="可貼上多個 TE，例如：
Aden
Samuel_Kuo@compal.com
Wendy_Zeng"></textarea>
        <div class="filter-actions">
          <span class="note">可用換行、逗號、分號分隔；可貼完整 email 或姓名片段。空白代表顯示全部 TE。</span>
          <button id="applyBtn" class="primary">Apply / Save</button>
        </div>
      </section>

      <section id="resultSection" class="hidden">
        <div class="actions">
          <div>
            <div id="summaryText" class="summary">尚未產生資料</div>
            <div class="note">日期使用 Actual End Date；若空白則改用 Actual Start Date。最後一欄 Total 為全部日期加總。</div>
          </div>
          <button id="downloadBtn" class="primary">另存新檔</button>
        </div>
        <div class="table-wrap">
          <table id="resultTable"><thead></thead><tbody></tbody></table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'te_daily_progress_terms_v2';
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const filterSection = document.getElementById('filterSection');
    const resultSection = document.getElementById('resultSection');
    const testerInput = document.getElementById('testerInput');
    const summaryText = document.getElementById('summaryText');
    const table = document.getElementById('resultTable');
    let records = [];
    let currentOutput = [];

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
    document.getElementById('applyBtn').addEventListener('click', () => { saveTerms(); renderOutput(); });
    document.getElementById('downloadBtn').addEventListener('click', downloadCsv);

    async function handleFile(file) {
      if (!file) return;
      if (!file.name.toLowerCase().endsWith('.xlsx')) { alert('請選擇 .xlsx 檔案'); return; }
      fileName.textContent = `已載入：${file.name}`;
      summaryText.textContent = '正在解析 Excel...';
      resultSection.classList.remove('hidden');
      try {
        records = await readXlsx(await file.arrayBuffer());
        testerInput.value = localStorage.getItem(STORAGE_KEY) || '';
        filterSection.classList.remove('hidden');
        renderOutput();
      } catch (err) {
        console.error(err);
        alert('讀取失敗：' + err.message);
      }
    }

    async function readXlsx(buffer) {
      const zip = await unzip(buffer);
      const sharedStrings = parseSharedStrings(zip['xl/sharedStrings.xml'] || '');
      const rels = parseRelationships(zip['xl/_rels/workbook.xml.rels']);
      const sheetTargets = parseWorkbookSheets(zip['xl/workbook.xml'], rels);
      for (const path of sheetTargets) {
        if (!zip[path]) continue;
        const parsed = rowsToRecords(parseWorksheet(zip[path], sharedStrings));
        if (parsed.length) return parsed;
      }
      throw new Error('找不到 Tester / Planned Setup Time / Planned Attended Time 欄位');
    }

    async function unzip(buffer) {
      const bytes = new Uint8Array(buffer);
      const entries = {};
      let eocd = -1;
      for (let i = bytes.length - 22; i >= 0; i--) if (u32(bytes, i) === 0x06054b50) { eocd = i; break; }
      if (eocd < 0) throw new Error('不是有效的 xlsx zip 檔');
      const total = u16(bytes, eocd + 10);
      let cd = u32(bytes, eocd + 16);
      for (let i = 0; i < total; i++) {
        const method = u16(bytes, cd + 10);
        const compressedSize = u32(bytes, cd + 20);
        const nameLen = u16(bytes, cd + 28);
        const extraLen = u16(bytes, cd + 30);
        const commentLen = u16(bytes, cd + 32);
        const localOffset = u32(bytes, cd + 42);
        const name = text(bytes.slice(cd + 46, cd + 46 + nameLen));
        const localNameLen = u16(bytes, localOffset + 26);
        const localExtraLen = u16(bytes, localOffset + 28);
        const dataStart = localOffset + 30 + localNameLen + localExtraLen;
        const compressed = bytes.slice(dataStart, dataStart + compressedSize);
        let data;
        if (method === 0) data = compressed;
        else if (method === 8) data = await inflateRaw(compressed);
        else throw new Error(`不支援的 zip 壓縮格式：${method}`);
        entries[name] = text(data);
        cd += 46 + nameLen + extraLen + commentLen;
      }
      return entries;
    }

    async function inflateRaw(data) {
      if (!('DecompressionStream' in window)) throw new Error('此瀏覽器不支援離線解壓縮，請用新版 Edge 或 Chrome 開啟');
      const stream = new Blob([data]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    function parseXml(xml) { return new DOMParser().parseFromString(xml, 'application/xml'); }
    function byLocal(node, name) { return [...node.getElementsByTagName('*')].filter(n => n.localName === name); }
    function parseSharedStrings(xml) { return xml ? byLocal(parseXml(xml), 'si').map(n => n.textContent.trim()) : []; }
    function parseRelationships(xml) {
      const map = {};
      byLocal(parseXml(xml), 'Relationship').forEach(n => map[n.getAttribute('Id')] = n.getAttribute('Target'));
      return map;
    }
    function parseWorkbookSheets(xml, rels) {
      return byLocal(parseXml(xml), 'sheet')
        .map(s => s.getAttribute('r:id') || s.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships', 'id'))
        .map(id => rels[id]).filter(Boolean).map(t => t.startsWith('/') ? t.slice(1) : 'xl/' + t);
    }
    function parseWorksheet(xml, sharedStrings) {
      return byLocal(parseXml(xml), 'row').map(row => {
        const cells = {};
        let max = -1;
        byLocal(row, 'c').forEach(c => {
          const idx = colIndex(c.getAttribute('r') || 'A');
          const type = c.getAttribute('t');
          const v = byLocal(c, 'v')[0];
          const inline = byLocal(c, 't')[0];
          let value = v ? v.textContent : (inline ? inline.textContent : '');
          if (type === 's') value = sharedStrings[Number(value)] || '';
          cells[idx] = String(value).trim();
          max = Math.max(max, idx);
        });
        const out = [];
        for (let i = 0; i <= max; i++) out.push(cells[i] || '');
        return out;
      });
    }

    function rowsToRecords(rows) {
      let headerIndex = -1;
      for (let i = 0; i < rows.length; i++) {
        const lower = rows[i].map(v => String(v).trim().toLowerCase());
        if (lower.includes('tester') && lower.includes('planned setup time') && lower.includes('planned attended time')) { headerIndex = i; break; }
      }
      if (headerIndex < 0) return [];
      const headers = rows[headerIndex].map(h => String(h).trim().toLowerCase());
      const idx = name => headers.indexOf(name);
      const testerCol = idx('tester'), setupCol = idx('planned setup time'), attendedCol = idx('planned attended time');
      const endCol = idx('actual end date'), startCol = idx('actual start date');
      const out = [];
      for (let i = headerIndex + 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row.some(Boolean)) continue;
        out.push({
          tester: row[testerCol] || '(No TE)',
          date: excelDate(row[endCol]) || excelDate(row[startCol]) || '(No Date)',
          hours: Math.round(((num(row[setupCol]) + num(row[attendedCol])) / 60) * 100) / 100
        });
      }
      return out;
    }

    function getTerms() { return testerInput.value.split(/[\n,;]+/).map(v => v.trim()).filter(Boolean); }
    function saveTerms() { localStorage.setItem(STORAGE_KEY, testerInput.value); }
    function testerMatches(tester, terms) {
      if (!terms.length) return true;
      const lower = tester.toLowerCase();
      return terms.some(term => {
        const t = term.toLowerCase();
        return lower === t || lower.includes(t) || t.includes(lower);
      });
    }

    function renderOutput() {
      const terms = getTerms();
      const filtered = records.filter(r => testerMatches(r.tester, terms));
      const selected = [...new Set(filtered.map(r => r.tester))].sort((a, b) => a.localeCompare(b));
      const dates = [...new Set(filtered.map(r => r.date))].sort((a, b) => dateSort(a) - dateSort(b));
      const hourMap = new Map();
      filtered.forEach(r => {
        const key = r.tester + '\t' + r.date;
        hourMap.set(key, (hourMap.get(key) || 0) + r.hours);
      });
      const rows = selected.map(tester => {
        let total = 0;
        const values = dates.map(date => {
          const value = Math.round((hourMap.get(tester + '\t' + date) || 0) * 100) / 100;
          total += value;
          return value ? value.toFixed(2) : '';
        });
        return [displayName(tester), ...values, total.toFixed(2)];
      });
      const totals = ['Total'];
      let grand = 0;
      dates.forEach((date, i) => {
        const sum = rows.reduce((acc, row) => acc + num(row[i + 1]), 0);
        grand += sum;
        totals.push(sum ? sum.toFixed(2) : '');
      });
      totals.push(grand.toFixed(2));
      currentOutput = [['TE', ...dates.map(dateCaption), 'Total'], ...rows, totals];
      drawTable(currentOutput);
      summaryText.textContent = `已統計 ${selected.length} 位 TE，全部產出 ${grand.toFixed(2)} 小時`;
      resultSection.classList.remove('hidden');
    }

    function drawTable(data) {
      table.tHead.innerHTML = '<tr>' + data[0].map(h => `<th>${esc(h)}</th>`).join('') + '</tr>';
      table.tBodies[0].innerHTML = data.slice(1).map((row, idx, arr) => {
        const cls = idx === arr.length - 1 ? ' class="total-row"' : '';
        return `<tr${cls}>${row.map((cell, i) => `<td class="${i === row.length - 1 ? 'total-col' : ''}">${esc(cell)}</td>`).join('')}</tr>`;
      }).join('');
    }
    function downloadCsv() {
      if (!currentOutput.length) return;
      saveTerms();
      const csv = currentOutput.map(row => row.map(csvCell).join(',')).join('\r\n');
      const blob = new Blob(['\ufeff' + csv], { type:'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'TE_Daily_Progress.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function u16(b, i) { return b[i] | (b[i + 1] << 8); }
    function u32(b, i) { return (b[i] | (b[i + 1] << 8) | (b[i + 2] << 16) | (b[i + 3] << 24)) >>> 0; }
    function text(bytes) { return new TextDecoder('utf-8').decode(bytes); }
    function colIndex(ref) {
      let out = 0;
      for (const ch of ref) { if (ch < 'A' || ch > 'Z') break; out = out * 26 + ch.charCodeAt(0) - 64; }
      return out - 1;
    }
    function num(v) { return Number(String(v ?? '').replace(/,/g, '').trim()) || 0; }
    function excelDate(v) {
      if (v == null || v === '') return '';
      const n = num(v);
      if (n) return new Date(Math.round((n - 25569) * 86400 * 1000)).toISOString().slice(0, 10);
      const d = new Date(v);
      return isNaN(d) ? '' : d.toISOString().slice(0, 10);
    }
    function dateCaption(v) { const d = new Date(v); return isNaN(d) ? v : `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`; }
    function dateSort(v) { const d = new Date(v); return isNaN(d) ? Number.MAX_SAFE_INTEGER : d.getTime(); }
    function displayName(v) { return String(v).split('@')[0]; }
    function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function csvCell(v) { const t = String(v ?? '').replace(/"/g, '""'); return /[",\r\n]/.test(t) ? `"${t}"` : t; }
  </script>
</body>
</html>
